<!-- Contacto -->
<div class="contact-container">
        <h2>Ponte en contacto</h2>
        
        <form action="https://formspree.io/f/mojrqrzd" method="POST">
            
            <div class="input-group">
                <label for="name">Nombre</label>
                <input type="text" id="name" name="nombre" placeholder="Tu nombre" required>
            </div>

            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
            </div>

            <div class="input-group">
                <label for="message">Mensaje</label>
                <textarea id="message" name="mensaje" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>
            </div>

            <button type="submit">Enviar Mensaje</button>
        </form>
    </div>
