<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vico Graphics</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>Vico Graphics</h1>
    <nav>
        <a href="index.html">Proyectos</a>
        <a href="Sobre Mí/index.html">Sobre mí</a>
        <a href="Contactos/index.html">Contacto</a>
        <a href="https://www.instagram.com/vicographics/" target="_blank">
            <img src="icons/instagram-53.svg" alt="instagram" width="20" height="20">

            <img src="icons/tiktok-icon-original.svg" alt="tiktok" width="20" height="20">

</header>

<!-- Carrusel -->
<section class="carousel-container">
    <div class="carousel-track" id="carousel">
        <img src="Images/Artboard 1-700.jpg" class="slide active">
        <img src="Images/Artboard 2-700.jpg" class="slide">
        <img src="Images/Artboard 3-700.jpg" class="slide">
    </div>
    <!-- Botones -->
    <button class="btn prev" onclick="moveSlide(-1)">❮</button>
    <button class="btn next" onclick="moveSlide(1)">❯</button>
    <!-- Indicadores -->
    <div class="dots">
        <span onclick="currentSlide(0)" class="dot active"></span>
        <span onclick="currentSlide(1)" class="dot"></span>
        <span onclick="currentSlide(2)" class="dot"></span>
    </div>
</section>

<!-- Sobre mí -->
<section id="sobre-mi" class="section">
    <h2>Sobre mí</h2>
    <p>Soy diseñador gráfico enfocado en branding, editorial y contenido para redes.</p>
</section>

<!-- Proyectos -->
<section id="proyectos" class="section">
    <h2>Mis Proyectos</h2>
    <div class="grid">
        <button onclick="irAProyecto('p1')" class="card">Proyecto 1</button>
        <button onclick="irAProyecto('p2')" class="card">Proyecto 2</button>
        <button onclick="irAProyecto('p3')" class="card">Proyecto 3</button>
    </div>
</section>

<!-- PROYECTO 1 -->
 <section id="p1" class="proyecto-detalle">
    <h2>Proyecto 1</h2>
    <div class="galeria">
        <img src="https://picsum.photos/300?1">
        <img src="https://picsum.photos/300?2">
        <img src="https://picsum.photos/300?3">
    </div>
</section>

<!-- PROYECTO 2 -->
 <section id="p2" class="proyecto-detalle">

    <div class="galeria">
        <img src="https://picsum.photos/300?4">
        <img src="https://picsum.photos/300?5">
        <img src="https://picsum.photos/300?6">
    </div>
</section>

<!-- PROYECTO 3 -->
 <section id="p3" class="proyecto-detalle">

        <img src="https://picsum.photos/300?7">
